<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Slumber is a social sleep tracker for iOS. Log your nights from Apple Health, share with friends, and race in sleep challenges."
    />
    <title>Slumber</title>

    <link rel="icon" type="image/png" href="/moon.png" />
    <link rel="apple-touch-icon" href="/og-image.png" />

    <!-- Open Graph / iMessage link preview -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Slumber" />
    <meta property="og:title" content="Slumber" />
    <meta
      property="og:description"
      content="Social sleep tracking for iOS. Log from Apple Health, share with friends, and join sleep challenges."
    />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__SITE_URL__/og-image.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Slumber moon logo" />

    <!-- Twitter / other crawlers -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Slumber" />
    <meta
      name="twitter:description"
      content="Social sleep tracking for iOS. Log from Apple Health, share with friends, and join sleep challenges."
    />
    <meta name="twitter:image" content="__SITE_URL__/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
